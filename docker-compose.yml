services:
  tradfri-mcp:
    build: .
    container_name: tradfri_mcp
    restart: unless-stopped
    ports:
      - "8765:8765"
    env_file:
      - .env
    environment:
      - MCP_PORT=8765
    volumes:
      - ./devices.json:/app/devices.json
      - ./aliases.json:/app/aliases.json
      - ./.tradfri_psk.json:/app/.tradfri_psk.json:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
